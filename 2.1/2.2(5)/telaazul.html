<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>CSS Propriedades</title>
  <style>
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }
.titulo-vermelho{
    color: red;
}
.font-size{
    font-size: 2rem;
}
.font-weight{
    font-weight: 900;
}
.font-family{
    font-family: 'Caveat', cursive;
    font-size: 24px;
}
.text-align{
 text-align: right 30px;
}

/* Não mude o CSS acima, adicione seu CSS abaixo */
  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p class="titulo-vermelho">Color</p>
  <p class="font-size">Font Size</p>
  <p class="font-weight">Font Weight</p>
  <p class="font-family">Font Family</p>
  <p class="text-align">Text Align</p>
